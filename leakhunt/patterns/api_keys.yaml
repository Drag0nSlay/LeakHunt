- name: "Slack Token"
  regex: "xox[baprs]-[0-9a-zA-Z-]{10,48}"
  severity: "high"
  entropy_required: false

- name: "Stripe API Key"
  regex: "sk_live_[0-9a-zA-Z]{24,}"
  severity: "high" 
  entropy_required: false

- name: "Heroku API Key"
  regex: "[h|H]eroku_[0-9A-F]{8}-[0-9A-F]{4}-[0-9A-F]{4}-[0-9A-F]{4}-[0-9A-F]{12}"
  severity: "high"
  entropy_required: false
