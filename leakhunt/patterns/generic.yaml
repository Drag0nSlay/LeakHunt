- name: "Generic API Key"
  regex: "api[_-]?key\\s*[=:]\\s*[\"']?[A-Za-z0-9_-]{16,128}[\"']?"
  severity: "medium"
  entropy_required: false

- name: "Generic Token" 
  regex: "token\\s*[=:]\\s*[\"']?[A-Za-z0-9_-]{16,128}[\"']?"
  severity: "medium"
  entropy_required: false

- name: "Generic Secret"
  regex: "(?:secret|password)\\s*[=:]\\s*[\"']?[A-Za-z0-9_-]{16,128}[\"']?"
  severity: "low"
  entropy_required: false

- name: "Environment Variable"
  regex: "([A-Z_]{3,}[A-Z0-9_]*)\\s*=\\s*[\"']?[A-Za-z0-9_-]{16,128}[\"']?"
  severity: "low"
  entropy_required: false
