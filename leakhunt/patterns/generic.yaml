- name: "Generic API Key"
  regex: 'api[_-]?key[=:][\s]*["\']?[A-Za-z0-9_-]{16,64}["\']?'
  severity: "medium"
  entropy_required: false

- name: "Generic Token" 
  regex: 'token[=:][\s]*["\']?[A-Za-z0-9_-]{16,64}["\']?'
  severity: "medium"
  entropy_required: false

- name: "Generic Secret"
  regex: '(?:secret|password)[=:][\s]*["\']?[A-Za-z0-9_-]{16,64}["\']?'
  severity: "low"
  entropy_required: false

- name: "Environment Variable"
  regex: '([A-Z_]{3,}[A-Z0-9_]*)=["\']?[A-Za-z0-9_-]{16,}["\']?'
  severity: "low"
  entropy_required: false
