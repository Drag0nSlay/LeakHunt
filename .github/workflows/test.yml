name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [ published ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -e .
    
    - name: Run tests
      run: |
        pytest -v --tb=short --strict-markers
    
    - name: Test CLI
      run: |
        leakhunt --help
        echo "ghp_testtoken1234567890abcdef1234567890" | leakhunt --safe-mode -
        echo 'api_key="test1234567890abcdef"' | leakhunt --safe-mode -
    
    - name: Test lab
      run: |
        leakhunt --dry-run -U lab/targets.txt
        leakhunt --safe-mode -U lab/targets.txt -o /tmp/test.json
    
    - name: Lint
      run: |
        pip install flake8
        flake8 leakhunt/
