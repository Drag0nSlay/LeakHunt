name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install dependencies
        timeout-minutes: 10
        run: |
          python -m pip install --upgrade pip --retries 5 --timeout 60
          pip install -r requirements.txt
          pip install -e .

      - name: Create lab test fixtures
        run: |
          mkdir -p lab
          echo "http://localhost:8080/index.html" > lab/targets.txt
          echo "http://localhost:8080/test_private_key.txt" >> lab/targets.txt

      - name: Run pytest
        run: pytest -v --tb=short --strict-markers

      - name: Smoke test CLI
        run: |
          leakhunt --dry-run -U lab/targets.txt
          leakhunt --safe-mode -U lab/targets.txt -o /tmp/test.json
